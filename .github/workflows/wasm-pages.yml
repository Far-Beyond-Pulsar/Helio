name: WASM Pages

on:
  push:
    branches:
      - main
    paths:
      - 'crates/helio-wasm-app/Cargo.toml'
      - 'crates/helio-wasm-examples/**'
      - 'crates/helio-render-v2/**'

jobs:
  # ── 1. Detect version bump ──────────────────────────────────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version bump
        id: check
        run: |
          CURRENT=$(grep -m1 '^version' crates/helio-wasm-app/Cargo.toml | cut -d'"' -f2)
          git checkout HEAD^1 -- crates/helio-wasm-app/Cargo.toml
          PREVIOUS=$(grep -m1 '^version' crates/helio-wasm-app/Cargo.toml | cut -d'"' -f2)
          git checkout HEAD   -- crates/helio-wasm-app/Cargo.toml
          echo "current=$CURRENT  previous=$PREVIOUS"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true"  >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged ($CURRENT), skipping deploy."
          fi

  # ── 2. Build all WASM examples + generate landing page ─────────────────────
  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-bindgen-cli (matching wasm-bindgen dep)
        run: |
          VERSION=$(cargo metadata --no-deps --manifest-path Cargo.toml --format-version 1 \
            | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; \
              print(next(p['version'] for p in pkgs if p['name']=='wasm-bindgen'))" 2>/dev/null \
            || echo "")
          if [ -n "$VERSION" ]; then
            cargo install --locked wasm-bindgen-cli --version "$VERSION"
          else
            cargo install --locked wasm-bindgen-cli
          fi

      - name: Build all WASM examples
        run: |
          chmod +x build-wasm.sh
          ./build-wasm.sh

      - name: Assemble site directory
        run: |
          set -euo pipefail
          EXAMPLES=(
            render_v2_basic
            render_v2_sky
            sdf_blend
            sdf_boolean
            sdf_demo
            sdf_grid
            sdf_morph
            sdf_move
            sdf_multi
            sdf_pulse
            sdf_terrain
          )
          for name in "${EXAMPLES[@]}"; do
            mkdir -p "site/$name"
            cp target/wasm-prebuilt/"$name"/* "site/$name/"
            cat > "site/$name/index.html" <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8"/>
            <title>Helio – $name</title>
            <style>body{margin:0;background:#111;}</style>
          </head>
          <body>
            <a href="../" style="position:fixed;top:8px;left:8px;color:#89b4fa;font-family:monospace;font-size:13px;z-index:10;">← examples</a>
            <script type="module">
              import init from './helio_wasm_examples.js';
              init();
            </script>
          </body>
          </html>
          HTML
          done

      - name: Generate landing page
        run: |
          EXAMPLES=(
            render_v2_basic
            render_v2_sky
            sdf_blend
            sdf_boolean
            sdf_demo
            sdf_grid
            sdf_morph
            sdf_move
            sdf_multi
            sdf_pulse
            sdf_terrain
          )
          DESCRIPTIONS=(
            "Radiance cascades, bloom, point lights"
            "Volumetric sky & clouds, dynamic sun"
            "SDF — blending shapes"
            "SDF — boolean toggle (union/difference)"
            "SDF — terrain + orbiting sphere"
            "SDF — 5×5 waving sphere grid"
            "SDF — sphere ↔ box morph"
            "SDF — moving sphere"
            "SDF — two orbiting spheres"
            "SDF — pulsing sphere"
            "SDF — animated terrain amplitude"
          )

          cat > site/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8"/>
            <title>Helio Render Examples</title>
            <meta name="viewport" content="width=device-width,initial-scale=1"/>
            <style>
              *{box-sizing:border-box;margin:0;padding:0}
              body{background:#0f0f13;color:#cdd6f4;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
              header{padding:2.5rem 2rem 1rem;border-bottom:1px solid #313244}
              header h1{font-size:2rem;font-weight:700;letter-spacing:.04em}
              header p{margin-top:.4rem;color:#a6adc8;font-size:.95rem}
              .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;padding:2rem}
              .card{background:#1e1e2e;border:1px solid #313244;border-radius:.75rem;overflow:hidden;
                    transition:border-color .15s,transform .15s;text-decoration:none;color:inherit;display:block}
              .card:hover{border-color:#89b4fa;transform:translateY(-2px)}
              .card-body{padding:1.1rem 1.25rem 1.3rem}
              .card-title{font-size:1rem;font-weight:600;font-family:monospace;color:#89b4fa}
              .card-desc{margin-top:.35rem;font-size:.85rem;color:#a6adc8;line-height:1.5}
              footer{padding:1.5rem 2rem;border-top:1px solid #313244;color:#585b70;font-size:.8rem;text-align:center}
            </style>
          </head>
          <body>
            <header>
              <h1>Helio — WebGPU Examples</h1>
              <p>Interactive demos running in the browser via WebGPU. Requires a browser with WebGPU support.</p>
            </header>
            <div class="grid">
          HTMLEOF

          for i in "${!EXAMPLES[@]}"; do
            NAME="${EXAMPLES[$i]}"
            DESC="${DESCRIPTIONS[$i]}"
            cat >> site/index.html <<CARD
              <a class="card" href="./$NAME/">
                <div class="card-body">
                  <div class="card-title">$NAME</div>
                  <div class="card-desc">$DESC</div>
                </div>
              </a>
          CARD
          done

          cat >> site/index.html <<'HTMLEOF'
            </div>
            <footer>Built with Helio render engine · WebGPU · Rust/WASM</footer>
          </body>
          </html>
          HTMLEOF

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ── 3. Deploy to GitHub Pages ───────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
