[package]
name = "helio"
version = "0.4.1"
edition = "2021"
authors = ["Helio Contributors"]
description = "High-level facade over helio-v3 for stable scene handles and O(1)-style CPU updates"
license = "MIT OR Apache-2.0"

[dependencies]
arrayvec = "0.7"
bytemuck = { version = "1.14", features = ["derive"] }
glam = { version = "0.29", features = ["bytemuck"] }
image = { version = "0.25", default-features = false, features = ["png"] }
helio-v3 = { path = "../helio-v3" }
helio-pass-billboard = { path = "../helio-pass-billboard" }
helio-pass-light-cull = { path = "../helio-pass-light-cull" }
helio-pass-virtual-geometry = { path = "../helio-pass-virtual-geometry" }
helio-pass-deferred-light = { path = "../helio-pass-deferred-light" }
helio-pass-depth-prepass = { path = "../helio-pass-depth-prepass" }
helio-pass-hiz = { path = "../helio-pass-hiz" }
helio-pass-occlusion-cull = { path = "../helio-pass-occlusion-cull" }
helio-pass-fxaa = { path = "../helio-pass-fxaa" }
helio-pass-gbuffer = { path = "../helio-pass-gbuffer" }
helio-pass-hlfs = { path = "../helio-pass-hlfs" }
helio-pass-shadow = { path = "../helio-pass-shadow" }
helio-pass-shadow-matrix = { path = "../helio-pass-shadow-matrix" }
helio-pass-simple-cube = { path = "../helio-pass-simple-cube" }
helio-pass-sky = { path = "../helio-pass-sky" }
helio-pass-sky-lut = { path = "../helio-pass-sky-lut" }
helio-pass-smaa = { path = "../helio-pass-smaa" }
helio-pass-ssao = { path = "../helio-pass-ssao" }
helio-pass-taa = { path = "../helio-pass-taa" }
helio-pass-transparent = { path = "../helio-pass-transparent" }
helio-pass-debug = { path = "../helio-pass-debug" }
libhelio = { path = "../libhelio" }
log = "0.4"
thiserror = "2.0"
wgpu = { git = "https://github.com/Far-Beyond-Pulsar/wgpu", rev = "fce5b80e8017304449124b12637ec324417e40c8", default-features = false, features = ["web", "webgpu", "wgsl"] }
pollster = "0.3"
quark = { git = "https://github.com/Far-Beyond-Pulsar/Quark", package = "quark" }