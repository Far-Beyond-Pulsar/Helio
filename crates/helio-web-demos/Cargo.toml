[package]
name = "helio-web-demos"
version = "0.1.0"
edition = "2021"
description = "All helio examples compiled to WASM — one feature flag per demo"
# wasm-pack reads wasm-opt config from this exact table. Placing `wasm-opt`
# under a bare `[package.metadata]` is silently ignored, so wasm-opt still runs.
# Disabling it removes a slow post-processing step and a source of build races.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[package.metadata.wasm-pack.profile.dev]
wasm-opt = false

# cdylib  = wasm-bindgen output
# rlib     = allows 'cargo check' on the native target for IDE support
[lib]
crate-type = ["cdylib", "rlib"]

# ── one feature per demo ─────────────────────────────────────────────────────
[features]
default = []
render_v2_basic     = []
render_v2_sky       = []
debug_shapes        = []
indoor_room         = []
indoor_corridor     = []
outdoor_night       = []
outdoor_canyon      = []
indoor_cathedral    = []
indoor_server_room  = []
outdoor_city        = []
outdoor_volcano     = []
space_station       = []
light_benchmark     = []
hlfs_benchmark      = []
sdf_demo            = ["dep:helio-pass-sdf"]
voxel_mesh_demo     = ["dep:helio-pass-voxel-mesh", "dep:helio-pass-fxaa", "dep:helio-voxel-core"]
vhs_backrooms       = ["dep:helio-pass-postprocess", "dep:libhelio"]
rc_benchmark        = []
load_fbx            = []
load_fbx_embedded   = []
ship_flight         = []
simple_graph        = []
outdoor_rocks       = []
editor_demo         = []

# ── dependencies ─────────────────────────────────────────────────────────────
[dependencies]
helio-wasm          = { path = "../helio-wasm" }
helio               = { workspace = true }
helio-core          = { workspace = true }
helio-default-graphs = { workspace = true }
helio-asset-compat  = { workspace = true }
helio-pass-sdf      = { workspace = true, optional = true }
helio-pass-voxel-mesh = { workspace = true, optional = true }
helio-pass-fxaa     = { workspace = true, optional = true }
helio-voxel-core    = { workspace = true, optional = true }
helio-pass-postprocess = { workspace = true, optional = true }
libhelio            = { workspace = true, optional = true }
wgpu                = { workspace = true }
glam                = { workspace = true, features = ["bytemuck"] }
log                 = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
# getrandom requires explicit js/wasm_js feature to work on wasm32-unknown-unknown.
# Both v0.2 and v0.3 may appear in the dep graph (e.g. uuid uses 0.2, newer crates use 0.3).
getrandom    = { version = "0.2", features = ["js"] }
getrandom03  = { package = "getrandom", version = "0.3", features = ["wasm_js"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
env_logger = { workspace = true }
