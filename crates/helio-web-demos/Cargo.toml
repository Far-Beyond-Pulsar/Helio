[package]
name = "helio-web-demos"
version = "0.1.0"
edition = "2021"
description = "All helio examples compiled to WASM — one feature flag per demo"

# cdylib  = wasm-bindgen output
# rlib     = allows 'cargo check' on the native target for IDE support
[lib]
crate-type = ["cdylib", "rlib"]

# ── one feature per demo ─────────────────────────────────────────────────────
[features]
default = []
render_v2_basic     = []
render_v2_sky       = []
debug_shapes        = []
indoor_room         = []
indoor_corridor     = []
outdoor_night       = []
outdoor_canyon      = []
indoor_cathedral    = []
indoor_server_room  = []
outdoor_city        = []
outdoor_volcano     = []
space_station       = []
light_benchmark     = []
rc_benchmark        = []
sdf_demo            = []
load_fbx            = []
load_fbx_embedded   = []
ship_flight         = []
simple_graph        = []
outdoor_rocks       = []

# ── dependencies ─────────────────────────────────────────────────────────────
[dependencies]
helio-wasm          = { path = "../helio-wasm" }
helio               = { path = "../helio" }
helio-asset-compat  = { path = "../helio-asset-compat" }
helio-pass-sdf      = { path = "../helio-pass-sdf" }
wgpu                = { workspace = true }
glam                = { version = "0.29", features = ["bytemuck"] }
log                 = "0.4"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
env_logger = "0.11"
