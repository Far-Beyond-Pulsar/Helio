<!doctype html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helio Live Portal</title>
  <!-- JetBrains Mono font for consistent monospace display -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/reactflow.style.css" />
  <script src="/vendor/react.development.js"></script>
  <script src="/vendor/react-dom.development.js"></script>
  <script src="/vendor/reactflow.min.js"></script>
  <script src="./js/helioGraph.js"></script>
  <script src="./js/timingTreeGraph.js"></script>
  <script type="module" src="./js/main.js"></script>
  <style>
    /* ── GitHub dark design tokens ── */
    :root {
      --canvas:        #0d1117;
      --canvas-subtle: #161b22;
      --canvas-inset:  #010409;
      --border:        #30363d;
      --border-muted:  #21262d;
      --fg:            #e6edf3;
      --fg-muted:      #8b949e;
      --fg-subtle:     #6e7681;
      --accent:        #388bfd;
      --success:       #3fb950;
      --attention:     #d29922;
      --danger:        #f85149;
      --gpu-color:     #f0883e;
      --cpu-color:     #56d364;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--canvas-inset);
      color: var(--fg);
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      line-height: 1.5;
      height: 100vh;
      overflow: hidden;
    }

    /* ── top nav ── */
    .gh-nav {
      height: 48px;
      background: var(--canvas-inset);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      position: relative;
      z-index: 100;
    }
    .gh-nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
    }
    .gh-nav-logo svg { flex-shrink: 0; }
    .gh-nav-divider { color: var(--fg-subtle); font-size: 16px; font-weight: 300; }
    .gh-nav-sub { font-size: 13px; font-weight: 400; color: var(--fg-muted); }
    .gh-nav-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--fg-muted);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--fg-subtle);
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 4px var(--success); }

    /* ── full screen pipeline graph ── */
    #cy {
      position: fixed;
      top: 48px;
      left: 0;
      width: 100vw;
      height: calc(100vh - 48px);
      background: var(--canvas);
      z-index: 0;
    }

    /* ── floating stat cards (overlay) ── */
    .stats-overlay {
      position: fixed;
      top: 64px;
      left: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 12px;
      pointer-events: none;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(22, 27, 34, 0.92);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 4px 12px rgba(1, 4, 9, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03);
      pointer-events: auto;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .stat-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(1, 4, 9, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .stat-card-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--fg-subtle);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--fg-muted);
      font-weight: 500;
    }

    .stat-value {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 15px;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: -0.02em;
    }

    .stat-value.accent { color: var(--accent); }
    .stat-value.gpu { color: var(--gpu-color); }
    .stat-value.cpu { color: var(--cpu-color); }
    .stat-value.success { color: var(--success); }

    .stat-unit {
      font-size: 10px;
      color: var(--fg-subtle);
      margin-left: 3px;
    }

    /* ── action buttons card ── */
    .actions-card {
      background: rgba(22, 27, 34, 0.92);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      box-shadow: 0 4px 12px rgba(1, 4, 9, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03);
      pointer-events: auto;
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .btn-icon {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--canvas-subtle);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px;
      width: 32px;
      height: 32px;
      color: var(--fg-muted);
      cursor: pointer;
      transition: all 0.12s ease;
    }
    .btn-icon:hover {
      background: var(--canvas);
      color: var(--fg);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(56, 139, 253, 0.2);
    }
    .btn-icon:active {
      transform: translateY(0);
    }
    .btn-icon svg { flex-shrink: 0; }
    .btn-icon.copied {
      color: var(--success);
      border-color: var(--success);
    }

    /* ── custom tooltip ── */
    .btn-icon::before {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: rgba(22, 27, 34, 0.98);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--fg);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease, transform 0.15s ease;
      box-shadow: 0 4px 12px rgba(1, 4, 9, 0.6);
      z-index: 10000;
    }
    .btn-icon:hover::before {
      opacity: 1;
      transform: translateX(-50%) translateY(-8px);
    }

    /* ── search box overlay ── */
    .search-overlay {
      position: fixed;
      top: 64px;
      right: 16px;
      z-index: 10;
      pointer-events: none;
    }

    .search-input {
      background: rgba(22, 27, 34, 0.92);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: var(--fg);
      width: 240px;
      outline: none;
      transition: all 0.15s ease;
      pointer-events: auto;
      box-shadow: 0 4px 12px rgba(1, 4, 9, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03);
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,139,253,0.2), 0 4px 12px rgba(1, 4, 9, 0.5);
    }
    .search-input::placeholder { color: var(--fg-subtle); }

    /* ── floating windows (draggable/resizable) ── */
    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 100;
      pointer-events: none;
      display: block;
    }

    @keyframes slideIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-container {
      position: fixed;
      background: rgba(22, 27, 34, 0.96);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: none;
      flex-direction: column;
      box-shadow: 0 16px 48px rgba(1, 4, 9, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05);
      animation: slideIn 0.2s ease;
      pointer-events: auto;
      resize: both;
      overflow: hidden;
      min-width: 400px;
      min-height: 300px;
    }
    .modal-container.active {
      display: flex;
    }
    .modal-container.maximized {
      top: 64px !important;
      left: 16px !important;
      right: 16px !important;
      bottom: 16px !important;
      width: auto !important;
      height: auto !important;
      resize: none;
    }
    .modal-container.minimized {
      display: none !important;
    }

    .modal-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      cursor: move;
      -webkit-user-select: none;
      user-select: none;
      background: rgba(13, 17, 23, 0.4);
    }
    .modal-header:active {
      cursor: grabbing;
    }

    .modal-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .modal-controls {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .modal-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 4px;
      color: var(--fg-muted);
      cursor: pointer;
      transition: all 0.12s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
    }
    .modal-btn:hover {
      background: var(--canvas);
      border-color: var(--border);
      color: var(--fg);
    }
    .modal-btn.close:hover {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
    }

    .modal-body {
      padding: 20px;
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    /* ── table styles (for modals) ── */
    .table-container {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--canvas);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    thead th {
      padding: 10px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      color: var(--fg-muted);
      background: var(--canvas-subtle);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    tbody tr { border-bottom: 1px solid var(--border-muted); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(56, 139, 253, 0.05); }
    tbody td {
      padding: 10px 16px;
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: nowrap;
    }
    td.pass-name { color: var(--fg); font-family: inherit; font-size: 13px; font-weight: 500; }
    td.gpu { color: var(--gpu-color); }
    td.cpu { color: var(--cpu-color); }

    /* ── sortable table headers ── */
    thead th.sortable {
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      padding-right: 24px;
    }
    thead th.sortable:hover {
      color: var(--accent);
    }
    thead th.sortable::after {
      content: '⇅';
      position: absolute;
      right: 8px;
      opacity: 0.3;
      font-size: 10px;
    }
    thead th.sortable.sorted-asc::after {
      content: '↑';
      opacity: 1;
      color: var(--accent);
    }
    thead th.sortable.sorted-desc::after {
      content: '↓';
      opacity: 1;
      color: var(--accent);
    }

    /* ── clickable table rows ── */
    tbody tr {
      cursor: pointer;
    }
    tbody tr:hover {
      background: rgba(56, 139, 253, 0.12) !important;
    }
    tbody tr:active {
      background: rgba(56, 139, 253, 0.18) !important;
    }

    /* ── tree graph container ── */
    .tree-container {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--canvas);
      overflow: hidden;
    }
    #timingTreeGraph {
      width: 100%;
      height: 600px;
      background: var(--canvas);
    }

    /* ── scene projections grid ── */
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .scene-view {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--canvas);
      padding: 12px;
    }
    .scene-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--fg-subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    canvas {
      width: 100%;
      height: 200px;
      display: block;
      border-radius: 4px;
      background: var(--canvas-inset);
      border: 1px solid var(--border-muted);
    }

    /* ── ReactFlow Controls ── */
    .react-flow__controls {
      background: rgba(22, 27, 34, 0.92);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(1, 4, 9, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }
    .react-flow__controls-button {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-muted);
      color: var(--fg-muted);
      fill: var(--fg-muted);
      width: 32px;
      height: 32px;
      padding: 6px;
      transition: background 0.12s, color 0.12s, fill 0.12s;
    }
    .react-flow__controls-button:last-child {
      border-bottom: none;
    }
    .react-flow__controls-button:hover {
      background: var(--canvas);
      color: var(--accent);
      fill: var(--accent);
    }
    .react-flow__controls-button svg {
      max-width: 14px;
      max-height: 14px;
    }

    /* ── ReactFlow Background (more visible dots) ── */
    .react-flow__background {
      opacity: 1 !important;
    }
    .react-flow__background path {
      stroke: rgba(48, 54, 61, 0.35) !important;
    }

    /* ── Custom scrollbars ── */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
      background: var(--canvas-inset);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
      border: 2px solid var(--canvas-inset);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
    .modal-body, .table-container {
      scrollbar-color: var(--border) var(--canvas-inset);
      scrollbar-width: thin;
    }

    /* ── toast notification ── */
    #copyToast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(22, 27, 34, 0.95);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--success);
      box-shadow: 0 8px 24px rgba(1, 4, 9, 0.8);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 10001;
    }
    #copyToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── minimized window tabs (floating bottom-right) ── */
    .minimized-tabs {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
      pointer-events: none;
    }

    .minimized-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(22, 27, 34, 0.96);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--fg-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      pointer-events: auto;
      box-shadow: 0 4px 16px rgba(1, 4, 9, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.03);
      min-width: 220px;
    }
    .minimized-tab:hover {
      background: rgba(22, 27, 34, 0.98);
      color: var(--fg);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(1, 4, 9, 0.8), 0 0 0 1px rgba(56, 139, 253, 0.3);
    }
    .minimized-tab svg {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
    }

    @media (max-width: 1024px) {
      .stats-overlay { flex-direction: column; }
      .stat-grid { grid-template-columns: 1fr; }
      .scene-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .actions-card { flex-direction: column; }
      .search-input { width: 200px; }
    }
  </style>
</head>
<body>

  <!-- ── nav ── -->
  <nav class="gh-nav">
    <a class="gh-nav-logo" href="/">
      <!-- Helio "H" mark in GitHub's octicon style -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="4" fill="#388bfd" fill-opacity="0.15"/>
        <path d="M6 5h2.5v5.5h7V5H18v14h-2.5v-6H8.5v6H6V5Z" fill="#388bfd"/>
      </svg>
      Helio
    </a>
    <span class="gh-nav-divider">/</span>
    <span class="gh-nav-sub">Live Portal</span>
    <div class="gh-nav-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="status">Connecting…</span>
    </div>
  </nav>

  <!-- ── full screen pipeline graph ── -->
  <div id="cy"></div>

  <!-- ── floating stat cards overlay ── -->
  <div class="stats-overlay">
    <!-- Frame metrics card -->
    <div class="stat-card">
      <div class="stat-card-title">Frame Metrics</div>
      <div class="stat-grid">
        <div class="stat-item">
          <span class="stat-label">Frame</span>
          <span class="stat-value accent" id="frame">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Frame time</span>
          <span class="stat-value" id="frameMs">—<span class="stat-unit">ms</span></span>
        </div>
        <div class="stat-item">
          <span class="stat-label">GPU total</span>
          <span class="stat-value gpu" id="gpuTotal">—<span class="stat-unit">ms</span></span>
        </div>
        <div class="stat-item">
          <span class="stat-label">CPU total</span>
          <span class="stat-value cpu" id="cpuTotal">—<span class="stat-unit">ms</span></span>
        </div>
      </div>
    </div>

    <!-- Scene metrics card -->
    <div class="stat-card">
      <div class="stat-card-title">Scene Stats</div>
      <div class="stat-grid">
        <div class="stat-item">
          <span class="stat-label">Objects</span>
          <span class="stat-value success" id="objCount">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Lights</span>
          <span class="stat-value success" id="lightCount">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Billboards</span>
          <span class="stat-value" id="bbCount">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Draw calls</span>
          <span class="stat-value" id="drawCalls">—</span>
        </div>
      </div>
    </div>

    <!-- Actions card -->
    <div class="actions-card">
      <button id="btnTimings" class="btn-icon" data-tooltip="Timings" aria-label="View per-pass timings">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1 0 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25ZM3.5 6.25a.75.75 0 0 1 .75-.75h7a.75.75 0 0 1 0 1.5h-7a.75.75 0 0 1-.75-.75Zm.75 2.25h4a.75.75 0 0 1 0 1.5h-4a.75.75 0 0 1 0-1.5Z"/></svg>
      </button>
      <button id="btnBreakdown" class="btn-icon" data-tooltip="Breakdown" aria-label="View frame timing breakdown">

  <!-- ── minimized window tabs ── -->
  <div id="minimizedTabs" class="minimized-tabs"></div>

  <script>
    // ── Window management with persistence ──────────────────────────────────
    let zIndexCounter = 1000;

    // Window metadata for minimize/restore
    const windowMetadata = {
      timingsModal: {
        title: 'Per-Pass Timings',
        icon: '<path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1 0 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25ZM3.5 6.25a.75.75 0 0 1 .75-.75h7a.75.75 0 0 1 0 1.5h-7a.75.75 0 0 1-.75-.75Zm.75 2.25h4a.75.75 0 0 1 0 1.5h-4a.75.75 0 0 1 0-1.5Z"/>',
      },
      breakdownModal: {
        title: 'Frame Timing Breakdown',
        icon: '<path d="M1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1 0 14.25V1.75C0 .784.784 0 1.75 0ZM1.5 1.75v12.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25H1.75a.25.25 0 0 0-.25.25ZM11.75 3a.75.75 0 0 1 .75.75v7.5a.75.75 0 0 1-1.5 0v-7.5a.75.75 0 0 1 .75-.75Zm-3.25.75a.75.75 0 0 1 1.5 0v7.5a.75.75 0 0 1-1.5 0ZM4 3a.75.75 0 0 1 .75.75v7.5a.75.75 0 0 1-1.5 0v-7.5A.75.75 0 0 1 4 3Z"/>',
      },
      sceneModal: {
        title: 'Scene Projections',
        icon: '<path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Zm7-3.25v2.992l2.028.812a.75.75 0 0 1-.557 1.392l-2.5-1A.751.751 0 0 1 7 8.25v-3.5a.75.75 0 0 1 1.5 0Z"/>',
      },
    };

    // Save window state to localStorage
    function saveWindowState(id) {
      const modal = document.getElementById(id);
      if (!modal) return;

      const state = {
        top: modal.style.top,
        left: modal.style.left,
        width: modal.style.width,
        height: modal.style.height,
        active: modal.classList.contains('active'),
        minimized: modal.classList.contains('minimized'),
        maximized: modal.classList.contains('maximized'),
      };

      localStorage.setItem(`helio-window-${id}`, JSON.stringify(state));
    }

    // Load window state from localStorage
    function loadWindowState(id) {
      const saved = localStorage.getItem(`helio-window-${id}`);
      if (!saved) return;

      try {
        const state = JSON.parse(saved);
        const modal = document.getElementById(id);
        if (!modal) return;

        if (state.top) modal.style.top = state.top;
        if (state.left) modal.style.left = state.left;
        if (state.width) modal.style.width = state.width;
        if (state.height) modal.style.height = state.height;

        if (state.active) {
          modal.classList.add('active');
        }
        if (state.minimized) {
          modal.classList.add('minimized');
        }
        if (state.maximized) {
          modal.classList.add('maximized');
        }
      } catch (e) {
        console.warn('Failed to load window state:', e);
      }
    }

    // Update minimized tabs (floating in bottom-right)
    function updateMinimizedTabs() {
      const tabsContainer = document.getElementById('minimizedTabs');
      const minimizedWindows = document.querySelectorAll('.modal-container.minimized');

      // Clear existing tabs
      tabsContainer.innerHTML = '';

      // Create a tab for each minimized window
      minimizedWindows.forEach(modal => {
        const meta = windowMetadata[modal.id];
        if (!meta) return;

        const tab = document.createElement('div');
        tab.className = 'minimized-tab';
        tab.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">${meta.icon}</svg>
          <span>${meta.title}</span>
        `;
        tab.onclick = () => restoreModal(modal.id);
        tabsContainer.appendChild(tab);
      });
    }

    function openModal(id) {
      const modal = document.getElementById(id);
      if (modal) {
        modal.classList.remove('minimized');
        modal.classList.add('active');
        modal.style.zIndex = ++zIndexCounter;
        updateMinimizedTabs();
        saveWindowState(id);
      }
    }

    function closeModal(id) {
      const modal = document.getElementById(id);
      if (modal) {
        modal.classList.remove('active');
        modal.classList.remove('minimized');
        updateMinimizedTabs();
        saveWindowState(id);
      }
    }

    function minimizeModal(id) {
      const modal = document.getElementById(id);
      if (modal) {
        modal.classList.add('minimized');
        updateMinimizedTabs();
        saveWindowState(id);
      }
    }

    function restoreModal(id) {
      const modal = document.getElementById(id);
      if (modal) {
        modal.classList.remove('minimized');
        modal.classList.add('active');
        modal.style.zIndex = ++zIndexCounter;
        updateMinimizedTabs();
        saveWindowState(id);
      }
    }

    function toggleMaximize(id) {
      const modal = document.getElementById(id);
      if (modal) {
        modal.classList.toggle('maximized');
        saveWindowState(id);
      }
    }

    // ── Draggable windows ────────────────────────────────────────────────────
    document.querySelectorAll('.modal-container').forEach(modal => {
      const header = modal.querySelector('.modal-header');
      let isDragging = false;
      let startX, startY, initialLeft, initialTop;

      // Load saved state on startup
      loadWindowState(modal.id);

      header.addEventListener('mousedown', (e) => {
        if (e.target.closest('.modal-controls')) return; // Don't drag when clicking buttons
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        const rect = modal.getBoundingClientRect();
        initialLeft = rect.left;
        initialTop = rect.top;
        modal.style.zIndex = ++zIndexCounter;
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        modal.style.left = `${initialLeft + dx}px`;
        modal.style.top = `${initialTop + dy}px`;
        modal.style.right = 'auto';
        modal.style.bottom = 'auto';
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          saveWindowState(modal.id);
        }
      });

      // Bring to front on click
      modal.addEventListener('mousedown', () => {
        modal.style.zIndex = ++zIndexCounter;
      });

      // Save state on resize (using ResizeObserver)
      const resizeObserver = new ResizeObserver(() => {
        if (modal.classList.contains('active') && !modal.classList.contains('maximized')) {
          saveWindowState(modal.id);
        }
      });
      resizeObserver.observe(modal);
    });

    // Update minimized tabs after all windows have loaded their state
    updateMinimizedTabs();

    // Close windows on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-container.active').forEach(modal => {
          closeModal(modal.id);
        });
      }
    });

    // Button click handlers
    document.getElementById('btnTimings').addEventListener('click', () => openModal('timingsModal'));
    document.getElementById('btnBreakdown').addEventListener('click', () => openModal('breakdownModal'));
    document.getElementById('btnScene').addEventListener('click', () => openModal('sceneModal'));

    // Status dot sync
    const _origStatus = document.getElementById('status');
    const _dot        = document.getElementById('statusDot');
    new MutationObserver(() => {
      const connected = _origStatus.textContent.toLowerCase().includes('connected');
      _dot.classList.toggle('connected', connected);
    }).observe(_origStatus, { childList: true, subtree: true, characterData: true });

    // ── Table sorting and navigation ──────────────────────────────────────────
    window.timingsData = [];
    window.sortColumn = null;
    window.sortDirection = 'asc';

    function sortTable(column) {
      if (window.sortColumn === column) {
        window.sortDirection = window.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        window.sortColumn = column;
        window.sortDirection = 'asc';
      }

      // Update header indicators
      document.querySelectorAll('#timingsTable thead th').forEach(th => {
        th.classList.remove('sorted-asc', 'sorted-desc');
        if (th.dataset.sort === column) {
          th.classList.add(window.sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc');
        }
      });

      // Sort data
      const sorted = [...window.timingsData].sort((a, b) => {
        let aVal = a[column];
        let bVal = b[column];

        // For string comparison (name)
        if (typeof aVal === 'string') {
          aVal = aVal.toLowerCase();
          bVal = bVal.toLowerCase();
          return window.sortDirection === 'asc'
            ? aVal.localeCompare(bVal)
            : bVal.localeCompare(aVal);
        }

        // For numeric comparison
        return window.sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
      });

      // Re-render table
      window.renderTimingsTable(sorted);
    }

    window.renderTimingsTable = function(data) {
      const rowsEl = document.getElementById('rows');
      if (!rowsEl) return;

      rowsEl.innerHTML = '';
      for (const row of data) {
        const tr = document.createElement('tr');
        tr.dataset.passName = row.name;
        tr.innerHTML = `
          <td class="pass-name">${row.name}</td>
          <td class="gpu">${row.gpu.toFixed(3)}</td>
          <td class="cpu">${row.cpu.toFixed(3)}</td>
          <td class="gpu">${row.gpuPct}%</td>
          <td class="cpu">${row.cpuPct}%</td>
        `;
        tr.addEventListener('click', () => {
          const graph = window.helioPortal?.getGraphInstance();
          if (graph && graph.focusNode) {
            graph.focusNode(row.name);
          }
        });
        rowsEl.appendChild(tr);
      }
    };

    // Initialize table sorting
    document.querySelectorAll('#timingsTable thead th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        sortTable(th.dataset.sort);
      });
    });
  </script>
