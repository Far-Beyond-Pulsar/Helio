<!doctype html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helio Live Portal</title>
  <link rel="stylesheet" href="/vendor/reactflow.style.css" />
  <script src="/vendor/react.development.js"></script>
  <script src="/vendor/react-dom.development.js"></script>
  <script src="/vendor/reactflow.min.js"></script>
  <script src="./js/helioGraph.js"></script>
  <script src="./js/timingTreeGraph.js"></script>
  <script type="module" src="./js/main.js"></script>
  <style>
    /* ── GitHub dark design tokens ── */
    :root {
      --canvas:        #0d1117;
      --canvas-subtle: #161b22;
      --canvas-inset:  #010409;
      --border:        #30363d;
      --border-muted:  #21262d;
      --fg:            #e6edf3;
      --fg-muted:      #8b949e;
      --fg-subtle:     #6e7681;
      --accent:        #388bfd;
      --success:       #3fb950;
      --attention:     #d29922;
      --danger:        #f85149;
      --gpu-color:     #f0883e;
      --cpu-color:     #56d364;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--canvas-inset);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    body {
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 64px; left: 0; width: 100vw; height: calc(100vh - 64px);
      pointer-events: none;
      z-index: 0;
      background-image: repeating-linear-gradient(0deg, rgba(48,54,61,0.08) 0px, rgba(48,54,61,0.08) 1px, transparent 1px, transparent 32px), repeating-linear-gradient(90deg, rgba(48,54,61,0.08) 0px, rgba(48,54,61,0.08) 1px, transparent 1px, transparent 32px);
    }

    /* ── top nav ── */
    .gh-nav {
      height: 64px;
      background: var(--canvas-inset);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    .gh-nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
    }
    .gh-nav-logo svg { flex-shrink: 0; }
    .gh-nav-divider { color: var(--fg-subtle); font-size: 18px; font-weight: 300; }
    .gh-nav-sub { font-size: 14px; font-weight: 400; color: var(--fg-muted); }
    .gh-nav-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--fg-muted);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--fg-subtle);
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }

    /* ── page wrapper ── */
    .page { max-width: 1280px; margin: 0 auto; padding: 24px 24px 48px; position: relative; z-index: 1; }

    /* ── GitHub box ── */
    .box {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--canvas-subtle);
      margin-bottom: 16px;
    }
    .box-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .box-header h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: 0.02em;
    }
    .box-header .counter {
      background: var(--canvas-subtle);
      border-radius: 2em;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--fg-muted);
      line-height: 20px;
    }
    .box-body { padding: 16px; }
    .box-body.flush { padding: 0; background: var(--canvas); }

    /* ── stat pills row ── */
    .stat-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stat-pill {
      display: flex;
      align-items: baseline;
      gap: 6px;
      background: var(--canvas);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 12px;
      color: var(--fg-muted);
    }
    .stat-pill .label { font-weight: 500; }
    .stat-pill .val {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
    }
    .stat-pill.accent .val { color: var(--accent); }
    .stat-pill.gpu    .val { color: var(--gpu-color); }
    .stat-pill.cpu    .val { color: var(--cpu-color); }

    /* ── search / filter ── */
    .search-input {
      background: var(--canvas-inset);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--fg);
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56,139,253,0.15); }
    .search-input::placeholder { color: var(--fg-subtle); }

    /* ── node graph container ── */
    #cy {
      width: 100%;
      height: 520px;
      border-radius: 0 0 6px 6px;
      background: var(--canvas);
      display: block;
    }

    /* ── timing tree ── */
    .tree-wrap {
      width: 100%;
      overflow-x: auto;
      background: var(--canvas);
    }
    #timingTree {
      display: block;
      min-width: 900px;
      width: 100%;
      height: 560px;
    }

    /* ── pass timings table ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    thead th {
      padding: 8px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: var(--fg-muted);
      background: var(--canvas-subtle);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border-muted); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--canvas); }
    tbody td {
      padding: 8px 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: nowrap;
    }
    td.pass-name { color: var(--fg); font-family: inherit; font-size: 13px; }
    td.gpu { color: var(--gpu-color); }
    td.cpu { color: var(--cpu-color); }

    /* ── scene canvas views ── */
    .views-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--canvas-inset);
      border-radius: 0 0 6px 6px;
      overflow: hidden;
    }
    .view-cell {
      background: var(--canvas);
      padding: 12px;
    }
    .view-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--fg-subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    canvas {
      width: 100%;
      height: 160px;
      display: block;
      border-radius: 4px;
      background: var(--canvas-inset);
      border: 1px solid var(--border-muted);
    }

    /* ── ghost tooltip ── */
    #tooltip {
      position: fixed;
      background: var(--canvas-subtle);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      pointer-events: none;
      z-index: 9999;
      max-width: 240px;
      box-shadow: 0 8px 24px rgba(1,4,9,0.8);
      display: none;
    }
    #tooltip .tt-title { color: var(--fg); font-weight: 600; margin-bottom: 6px; }
    #tooltip .tt-row   { color: var(--fg-muted); display: flex; justify-content: space-between; gap: 16px; margin: 2px 0; }
    #tooltip .tt-val   { color: var(--fg); font-family: ui-monospace, Menlo, monospace; }

    /* ── ReactFlow Controls ── */
    .react-flow__controls {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      box-shadow: 0 2px 8px #010409;
      overflow: hidden;
    }
    .react-flow__controls-button {
      background: #161b22;
      border: none;
      border-bottom: 1px solid #30363d;
      color: #8b949e;
      fill: #8b949e;
      width: 28px;
      height: 28px;
      padding: 5px;
      transition: background 0.15s, color 0.15s, fill 0.15s;
    }
    .react-flow__controls-button:last-child {
      border-bottom: none;
    }
    .react-flow__controls-button:hover {
      background: #21262d;
      color: #e6edf3;
      fill: #e6edf3;
    }
    .react-flow__controls-button svg {
      max-width: 12px;
      max-height: 12px;
    }

    /* ── Custom scrollbars ── */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
      background: var(--canvas-inset);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
    .scrollbar-custom {
      scrollbar-color: var(--border) var(--canvas-inset);
      scrollbar-width: thin;
    }
    .table-wrap, .tree-wrap, .views-grid, .box-body {
      scrollbar-color: var(--border) var(--canvas-inset);
      scrollbar-width: thin;
    }

    @media (max-width: 768px) {
      .views-grid { grid-template-columns: 1fr; }
      .stat-row   { flex-direction: column; }
      #cy         { height: 380px; }
    }
  </style>
</head>
<body>

  <!-- ── nav ── -->
  <nav class="gh-nav">
    <a class="gh-nav-logo" href="/">
      <!-- Helio "H" mark in GitHub's octicon style -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="4" fill="#388bfd" fill-opacity="0.15"/>
        <path d="M6 5h2.5v5.5h7V5H18v14h-2.5v-6H8.5v6H6V5Z" fill="#388bfd"/>
      </svg>
      Helio
    </a>
    <span class="gh-nav-divider">/</span>
    <span class="gh-nav-sub">Live Portal</span>
    <div class="gh-nav-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="status">Connecting…</span>
    </div>
  </nav>

  <main class="page">

    <!-- ── frame metrics ── -->
    <div class="box">
      <div class="box-header">
        <h2>Frame Metrics</h2>
      </div>
      <div class="box-body">
        <div class="stat-row">
          <div class="stat-pill accent">
            <span class="label">Frame</span>
            <span class="val" id="frame">—</span>
          </div>
          <div class="stat-pill">
            <span class="label">Frame time</span>
            <span class="val" id="frameMs">—</span>
            <span style="color:var(--fg-subtle);font-size:11px">ms</span>
          </div>
          <div class="stat-pill">
            <span class="label">Frame-to-frame</span>
            <span class="val" id="ftfMs">—</span>
            <span style="color:var(--fg-subtle);font-size:11px">ms</span>
          </div>
          <div class="stat-pill gpu">
            <span class="label">GPU total</span>
            <span class="val" id="gpuTotal">—</span>
            <span style="color:var(--fg-subtle);font-size:11px">ms</span>
          </div>
          <div class="stat-pill cpu">
            <span class="label">CPU total</span>
            <span class="val" id="cpuTotal">—</span>
            <span style="color:var(--fg-subtle);font-size:11px">ms</span>
          </div>
          <div class="stat-pill">
            <span class="label">Objects</span>
            <span class="val" id="objCount">—</span>
          </div>
          <div class="stat-pill">
            <span class="label">Lights</span>
            <span class="val" id="lightCount">—</span>
          </div>
          <div class="stat-pill">
            <span class="label">Billboards</span>
            <span class="val" id="bbCount">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── pipeline node graph ── -->
    <div class="box">
      <div class="box-header" style="justify-content:space-between">
        <h2>Render Pipeline</h2>
        <input type="text" id="searchBox" class="search-input" placeholder="Filter passes…" />
      </div>
      <div id="cy"></div>
    </div>

    <!-- ── per-pass timings ── -->
    <div class="box">
      <div class="box-header">
        <h2>Per-Pass Timings</h2>
      </div>
      <div class="box-body flush">
        <div class="table-wrap" style="max-height:320px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th>Pass</th>
                <th>GPU ms</th>
                <th>CPU %</th>
                <th>GPU %</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── timing breakdown tree ── -->
    <div class="box">
      <div class="box-header">
        <h2>Frame Timing Breakdown</h2>
      </div>
      <div class="box-body flush">
        <div class="tree-wrap">
          <div id="timingTreeGraph" style="width:100%;height:560px;background:#0d1117;border-radius:6px;"></div>
        </div>
      </div>
    </div>

    <!-- ── scene views ── -->
    <div class="box">
      <div class="box-header">
        <h2>Scene Projections</h2>
      </div>
      <div class="views-grid">
        <div class="view-cell">
          <div class="view-label">Top · XZ</div>
          <canvas id="viewTop" width="420" height="220"></canvas>
        </div>
        <div class="view-cell">
          <div class="view-label">Front · XY</div>
          <canvas id="viewFront" width="420" height="220"></canvas>
        </div>
        <div class="view-cell">
          <div class="view-label">Side · ZY</div>
          <canvas id="viewSide" width="420" height="220"></canvas>
        </div>
      </div>
    </div>

  </main>

  <div id="tooltip">
    <div class="tt-title"></div>
  </div>

  <script>
    // Keep the status dot in sync with the #status text set by main.js
    const _origStatus = document.getElementById('status');
    const _dot        = document.getElementById('statusDot');
    new MutationObserver(() => {
      const connected = _origStatus.textContent.toLowerCase().includes('connected');
      _dot.classList.toggle('connected', connected);
    }).observe(_origStatus, { childList: true, subtree: true, characterData: true });
  </script>
</body>
</html>
