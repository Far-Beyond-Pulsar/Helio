[package]
name = "helio-wasm"
version = "0.1.0"
edition = "2021"
description = "Cross-platform WASM wrapper — turns any helio demo into a browser app"

[lib]
crate-type = ["rlib"]

[dependencies]
helio = { path = "../helio" }
wgpu = { git = "https://github.com/Far-Beyond-Pulsar/wgpu", rev = "fce5b80e8017304449124b12637ec324417e40c8", default-features = false, features = ["web", "webgpu", "wgsl"] }
winit = "0.30"
log = "0.4"
glam = { version = "0.29", features = ["bytemuck"] }

# ----- WASM-only deps -------------------------------------------------------
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen          = "0.2"
wasm-bindgen-futures  = "0.4"
js-sys                = "0.3"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "HtmlElement",
    "Performance",
] }
console_log             = "1"
console_error_panic_hook = "0.1"

# ----- native-only deps -----------------------------------------------------
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
pollster    = "0.4"
env_logger  = "0.11"
