[package]
name = "helio-wasm-examples"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window", "Document", "HtmlCanvasElement",
    "KeyboardEvent", "MouseEvent", "HtmlElement", "Element", "EventTarget",
] }
log = "0.4"
console_error_panic_hook = "0.1"
wasm-logger = "0.2"

glam = "0.29"

wgpu = { git = "https://github.com/Far-Beyond-Pulsar/wgpu", rev = "fce5b80e8017304449124b12637ec324417e40c8", default-features = false, features = ["web", "webgpu"] }
raw-window-handle = { version = "0.6", features = ["wasm-bindgen-0-2"] }
helio-render-v2 = { path = "../helio-render-v2", default-features = false }
image = { version = "0.25", default-features = false, features = ["png"] }

[features]
default = []

# ── examples ──────────────────────────────────────────────────────────────────
render_v2_basic   = []
render_v2_sky     = []
sdf_blend         = []
sdf_boolean       = []
sdf_demo          = []
sdf_grid          = []
sdf_morph         = []
sdf_move          = []
sdf_multi         = []
sdf_pulse         = []
sdf_terrain       = []
