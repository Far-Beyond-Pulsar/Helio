[package]
name        = "nebula-visibility"
version     = "0.1.0"
edition     = "2021"
license     = "MIT OR Apache-2.0"
authors     = ["Far Beyond Pulsar"]
repository  = "https://github.com/Far-Beyond-Pulsar/Nebula"
description = "Potentially-visible set (PVS) baking via GPU occlusion testing"

[dependencies]
nebula-core      = { path = "../nebula-core" }
nebula-gpu       = { path = "../nebula-gpu" }
nebula-serialize = { path = "../nebula-serialize" }
wgpu             = { version = "30.0.0", default-features = true, features = ["vulkan", "metal", "dx12", "gles", "webgpu", "wgsl"] }
glam             = { version = "0.33", features = ["bytemuck", "serde"] }
bytemuck         = { version = "1", features = ["derive"] }
serde            = { version = "1", features = ["derive"] }
thiserror        = "1"
log              = "0.4"
serde_json       = "1"
bincode          = { version = "2", features = ["serde"] }
async-trait      = "0.1"
rayon            = "1"

[dev-dependencies]
pollster   = "0.3"
serde_json = "1"
bitflags   = "2"
