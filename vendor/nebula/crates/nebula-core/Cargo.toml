[package]
name        = "nebula-core"
version     = "0.1.0"
edition     = "2021"
license     = "MIT OR Apache-2.0"
authors     = ["Far Beyond Pulsar"]
repository  = "https://github.com/Far-Beyond-Pulsar/Nebula"
description = "Core traits, types, and GPU bake context for the Nebula baking framework"

[dependencies]
wgpu         = { version = "30.0.0", default-features = true, features = ["vulkan", "metal", "dx12", "gles", "webgpu", "wgsl"] }
glam         = { version = "0.33", features = ["bytemuck", "serde"] }
bytemuck     = { version = "1", features = ["derive"] }
serde        = { version = "1", features = ["derive"] }
thiserror    = "1"
async-trait  = "0.1"
log          = "0.4"
bitflags     = "2"
uuid         = { version = "1", features = ["v4", "serde"] }
pollster     = "0.3"
