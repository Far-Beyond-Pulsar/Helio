[package]
name        = "nebula-gpu"
version     = "0.1.0"
edition     = "2021"
license     = "MIT OR Apache-2.0"
authors     = ["Far Beyond Pulsar"]
repository  = "https://github.com/Far-Beyond-Pulsar/Nebula"
description = "Typed wgpu helpers: buffers, textures, compute pipelines, GPU→CPU readback"

[dependencies]
nebula-core  = { path = "../nebula-core" }
wgpu         = { version = "30.0.0", default-features = true, features = ["vulkan", "metal", "dx12", "gles", "webgpu", "wgsl"] }
bytemuck     = { version = "1", features = ["derive"] }
glam         = { version = "0.33", features = ["bytemuck", "serde"] }
thiserror    = "1"
log          = "0.4"

[dev-dependencies]
nebula-core = { path = "../nebula-core" }
pollster    = "0.3"
bytemuck    = { version = "1", features = ["derive"] }
wgpu        = { version = "30.0.0", default-features = true, features = ["vulkan", "metal", "dx12", "gles", "webgpu", "wgsl"] }
