[package]
name        = "nebula-serialize"
version     = "0.1.0"
edition     = "2021"
license     = "MIT OR Apache-2.0"
authors     = ["Far Beyond Pulsar"]
repository  = "https://github.com/Far-Beyond-Pulsar/Nebula"
description = "Binary (.nebula chunks) and JSON metadata serializers for Nebula bake outputs"

[dependencies]
nebula-core  = { path = "../nebula-core" }
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
bincode      = { version = "2", features = ["serde"] }
zstd         = "0.13"
thiserror    = "1"
log          = "0.4"
